name: Go Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/with-go@v5
      with:
        go-version: '1.24'

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libonnxruntime-dev || true
        # Note: libonnxruntime-dev might not be in standard repos, 
        # but we'll try to build anyway as the Go library uses runtime loading.

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./pkg/...
